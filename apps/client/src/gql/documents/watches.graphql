query Watches {
  watches {
    id
    name
    targetUrl
    responseType
    extractorExpression
    conditionOperator
    expectedValue
    scheduleExpression
    createdAt
    updatedAt
  }
}

query Watch($id: ID!) {
  watch(id: $id) {
    id
    name
    targetUrl
    responseType
    extractorExpression
    conditionOperator
    expectedValue
    scheduleExpression
    createdAt
    updatedAt
  }
}

mutation CreateWatch($input: CreateWatchInput!) {
  createWatch(input: $input) {
    id
    name
    targetUrl
    responseType
    extractorExpression
    conditionOperator
    expectedValue
    scheduleExpression
    createdAt
    updatedAt
  }
}

mutation UpdateWatch($id: ID!, $input: UpdateWatchInput!) {
  updateWatch(id: $id, input: $input) {
    id
    name
    targetUrl
    responseType
    extractorExpression
    conditionOperator
    expectedValue
    scheduleExpression
    createdAt
    updatedAt
  }
}

mutation DeleteWatch($id: ID!) {
  deleteWatch(id: $id)
}
